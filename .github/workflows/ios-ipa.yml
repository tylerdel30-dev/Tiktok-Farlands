name: Build Signed iOS IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method (development, ad-hoc, app-store)"
        required: true
        default: "ad-hoc"

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_DIR: "Tiktok Farlands"
      PROJECT_PATH: "Tiktok Farlands/Tiktok Farlands.xcodeproj"
      PROJECT_SPEC: "Tiktok Farlands/project.yml"
      SCHEME: "Tiktok Farlands"
      CONFIGURATION: "Release"
      ARCHIVE_PATH: "${{ runner.temp }}/TiktokFarlands.xcarchive"
      EXPORT_PATH: "${{ runner.temp }}/export"
      FINAL_IPA_DIR: "${{ github.workspace }}/ipa-output"
      KEYCHAIN_PATH: "${{ runner.temp }}/build.keychain-db"
      KEYCHAIN_PASSWORD: "${{ secrets.KEYCHAIN_PASSWORD }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          if [ ! -f "$PROJECT_SPEC" ]; then
            echo "Missing XcodeGen spec at: $PROJECT_SPEC"
            exit 1
          fi
          xcodegen generate --spec "$PROJECT_SPEC"
          if [ ! -d "$PROJECT_PATH" ]; then
            echo "Project generation failed, missing: $PROJECT_PATH"
            exit 1
          fi

      - name: Decode certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/build_pp.mobileprovision

      - name: Configure keychain and import certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/build_certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Generate local Secrets.xcconfig for CI
        env:
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REDIRECT_URI: ${{ secrets.TIKTOK_REDIRECT_URI }}
          TIKTOK_RECOMMENDATIONS_ENDPOINT: ${{ secrets.TIKTOK_RECOMMENDATIONS_ENDPOINT }}
          TIKTOK_TOKEN_EXCHANGE_ENDPOINT: ${{ secrets.TIKTOK_TOKEN_EXCHANGE_ENDPOINT }}
        run: |
          cat <<EOF > "$APP_DIR/Secrets.xcconfig"
          TIKTOK_CLIENT_KEY = ${TIKTOK_CLIENT_KEY}
          TIKTOK_CLIENT_SECRET = ${TIKTOK_CLIENT_SECRET}
          TIKTOK_REDIRECT_URI = ${TIKTOK_REDIRECT_URI}
          TIKTOK_RECOMMENDATIONS_ENDPOINT = ${TIKTOK_RECOMMENDATIONS_ENDPOINT}
          TIKTOK_TOKEN_EXCHANGE_ENDPOINT = ${TIKTOK_TOKEN_EXCHANGE_ENDPOINT}
          EOF

      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          PROFILE_NAME: ${{ secrets.PROFILE_NAME }}
        run: |
          cat <<EOF > ci/ios/ExportOptions.generated.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Archive app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROFILE_NAME }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ci/ios/ExportOptions.generated.plist

      - name: Prepare easy-to-find IPA output
        run: |
          mkdir -p "$FINAL_IPA_DIR"
          IPA_PATH=$(ls "$EXPORT_PATH"/*.ipa | head -n 1)
          cp "$IPA_PATH" "$FINAL_IPA_DIR/Tiktok Farlands.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tiktok-Farlands-Signed-IPA
          path: ${{ env.FINAL_IPA_DIR }}/Tiktok Farlands.ipa
